<html>
<head>
<link rel="stylesheet" href="./style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="global">
        <div class="right-side">
            <div class="rs-head">
                <div class="rs-logo"><img src="./icons/coins-solid-full.png" alt="coins"></div>
                <div class="rs-head-text">
                    <h1>مدبّر</h1>
                    <p>إدارة أموالك بذكاء</p>
                </div>
            </div>
            <div class="rs-body">
                <div class="rs-buttons">
                       <div class="rs-button1"><div class="button1-img"><img src="./icons/house-solid-full.png" alt="home"></div><div class="button1-text">الصفحة الرئيسية</div></div>
                       <div class="rs-button"><img src="./icons/arrow-right-arrow-left-solid-full.png" alt="arrows"><span>المعاملات</span></div>

        </div>

        </div>
