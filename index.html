<html>
  <head>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="global">
      <div class="right-side">
        <div class="rs-head">
          <div class="rs-logo">
            <img src="./icons/coins-solid-full.png" alt="coins" />
          </div>
          <div class="rs-head-text">
            <h1>مدبّر</h1>
            <p>إدارة أموالك بذكاء</p>
          </div>
        </div>
        <div class="rs-body">
          <div class="rs-buttons">
            <div class="rs-button1">
              <div class="button1-img">
                <img src="./icons/house-solid-full.png" alt="home" />
              </div>
              <div class="button1-text">الصفحة الرئيسية</div>
            </div>
            <div class="rs-button">
              <img
                src="./icons/arrow-right-arrow-left-solid-full.png"
                alt="arrows"
              /><span>المعاملات</span>
            </div>
            <div class="rs-button">
              <img src="./icons/chart-pie-solid-full.png" alt="pie" /><span
                >الميزانيات</span
              >
            </div>
            <div class="rs-button">
              <img src="./icons/piggy-bank-solid.png" alt="piggy" /><span
                >المدخرات</span
              >
            </div>
            <div class="rs-button">
              <img
                src="./icons/file-invoice-dollar-solid-full.png"
                alt="invoice"
              /><span>الفواتير الشهرية</span>
            </div>
            <p>إجراءات سريعة</p>
            <div class="rs-button2">
              <div class="rs-img2">
                <img src="./icons/paper-plane-solid-full.png" alt="paper" />
              </div>
              <span>إرسال أموال</span>
            </div>
            <div class="rs-button2">
              <div class="rs-img3">
                <img src="./icons/plus-solid-full.png" alt="plus" />
              </div>
              <span>إضافة أموال</span>
            </div>
            <div class="rs-button2">
              <div class="rs-img4">
                <img src="./icons/receipt-solid-full.png" alt="receipt" />
              </div>
              <span>دفع فاتورة</span>
            </div>
            <div class="rs-button2">
              <div class="rs-img5">
                <img src="./icons/chart-line-solid-full.png" alt="chart" />
              </div>
              <span>استثمار</span>
            </div>
          </div>
        </div>
      </div>
      <div class="main">
        <div class="container">
          <div class="main-head">
            <div class="top-bar">
              <div class="rs-head2">
                <div class="rs-logo">
                  <img src="./icons/coins-solid-full.png" alt="coins" />
                </div>
                <div class="rs-head-text2">
                  <h2>مدبّر</h2>
                  <p>إدارة أموالك بذكاء</p>
                </div>
                <div class="motasel">
                  <div class="green-circle"></div>
                  متصل
                </div>
              </div>
              <div class="top-bar-left">
                <div class="search">
                  <img
                    src="./icons/magnifying-glass-solid-full.png"
                    alt="search"
                  />
                </div>
                <div class="search">
                  <img src="./icons/bell-regular-full.png" alt="notify" />
                </div>
                <div class="name">
                  <div class="name-text">
                    <h5>سيف أسامة</h5>
                    <p>حساب مميز</p>
                  </div>
                  <div class="name-img">
                    <img src="./images/avatar-1.jpg" alt="av1" />
                  </div>
                </div>
              </div>
            </div>
            <div class="body1">
              <div class="body3-text">
                <p>المصروفات</p>
                <h3>10,000 جنية</h3>
              </div>
              <div class="body1-end">
                <img src="./icons/arrow-down-solid-full.png" alt="arrow" />
                <span>-1.2%</span>
              </div>
            </div>
            <div class="body2">
              <div class="body3-text">
                <p>الدخل</p>
                <h3>15,000 جنية</h3>
              </div>
              <div class="body3-end">
                <img src="./icons/arrow-down-solid-full.png" alt="arrow" />
                <span>+8.2%</span>
              </div>
            </div>
            <div class="body3">
              <div class="body3-text">
                <p>الرصيد الحالي</p>
                <h3>8,450 جنية</h3>
              </div>
              <div class="body3-end">
                <img src="./icons/arrow-down-solid-full.png" alt="arrow" />
                <span>+2.5%</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
